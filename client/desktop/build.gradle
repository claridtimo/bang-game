dependencies {
  api project(":client:shared")
  implementation "com.badlogicgames.gdx:gdx-backend-lwjgl:${gdxVersion}"
  implementation group: "com.badlogicgames.gdx", name: "gdx-platform", version: gdxVersion,
          classifier: "natives-desktop"
}

// bake the deployment config into our jar alongside our other resources
processResources {
  from("../../etc/${deployment}") {
    include "deployment.properties"
  }
}

tasks.register("deploy", Sync) {
  from jar
  from configurations.runtimeClasspath
  into project.file("../../build/client")
}
