// Phase 5 prototype: converts compiled Bang model.dat files (vendored jME fork binary
// format) into jMonkeyEngine 3 .j3o files. Deliberately isolated: this is the only
// module with jME3 dependencies, and nothing else depends on it.

plugins {
  id "application"
}

dependencies {
  // the fork loader (app) plus the game-sprite emission controller classes that 61
  // model.dat files reference by class name during deserialization
  implementation project(":client:shared")

  implementation "org.jmonkeyengine:jme3-core:${jme3Version}"
  // AWTLoader, for loading the .png textures referenced by converted materials
  implementation "org.jmonkeyengine:jme3-desktop:${jme3Version}"
}

application {
  mainClass = "com.threerings.bang.tools.j3o.ModelToJ3o"
}

// full-corpus parity + coverage harness (see VerifyCorpus). Run:
//   ./gradlew :tools:j3o-converter:verifyCorpus
// pointed at the staged resource tree the untouched compileModels step produces.
tasks.register("verifyCorpus", JavaExec) {
  group = "verification"
  classpath = sourceSets.main.runtimeClasspath
  mainClass = "com.threerings.bang.tools.j3o.VerifyCorpus"
  args = [ rootProject.file("assets/build/staging/rsrc").absolutePath ]
}
